name: Desktop Release

on:
  push:
    tags: ['desktop-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: angles-desktop-macos-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: angles-desktop-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: angles-desktop-windows-x64
            binary_ext: .exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: desktop

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          BIN="desktop/target/${{ matrix.target }}/release/angles-desktop${{ matrix.binary_ext }}"
          if [ ! -f "$BIN" ]; then
            BIN="desktop/target/${{ matrix.target }}/release/angles-desktop"
          fi
          cp "$BIN" "dist/${{ matrix.artifact }}${{ matrix.binary_ext }}"
          cd dist
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            7z a "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}${{ matrix.binary_ext }}"
          else
            tar czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}${{ matrix.binary_ext }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
          name: Angles Desktop ${{ github.ref_name }}
          generate_release_notes: true
